<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Meu Perfil - Samsung</title>
    <link rel="stylesheet" href="css/show.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
</head>
<body>

<div class="container-show">
    <!-- Header -->
    <div class="header-show">
        <div class="header-content">
            <img src="Imagens/logo2.png" alt="Samsung" class="logo-header">
            <h1>Meu Perfil Samsung</h1>
            <div class="header-botoes">
                <button class="btn-home" onclick="window.location.href='index.html'">🏠 Home</button>
                <button class="btn-sair" onclick="fazerLogout()">🚪 Sair</button>
            </div>
        </div>
    </div>

    <!-- Loading State -->
    <div id="loading" class="loading-show" style="display: none;">
        <div class="spinner"></div>
        <p>Carregando seus dados...</p>
    </div>

    <!-- Main Content -->
    <div id="conteudo" style="display: none;">
        <!-- Informações do Usuário -->
        <div class="card-profile">
            <div class="profile-header">
                <div class="avatar">
                    <i class="fas fa-user"></i>
                </div>
                <div class="profile-info">
                    <h2 id="nomeUsuario">Carregando...</h2>
                    <p id="emailUsuario">Carregando...</p>
                    <p id="telefoneUsuario" style="display: none;"></p>
                </div>
                <button class="btn-editar" onclick="habilitarEdicao()">
                    ✏️ Editar
                </button>
            </div>
        </div>

        <!-- Dados Pessoais -->
        <div class="card-info">
            <h3><i class="fas fa-id-card"></i> Dados Pessoais</h3>
            <div class="info-grid">
                <div class="info-item">
                    <label>Nome Completo</label>
                    <p id="infoNome">-</p>
                </div>
                <div class="info-item">
                    <label>E-mail</label>
                    <p id="infoEmail">-</p>
                </div>
                <div class="info-item">
                    <label>Telefone</label>
                    <p id="infoTelefone">-</p>
                </div>
                <div class="info-item">
                    <label>Data de Nascimento</label>
                    <p id="infoData">-</p>
                </div>
            </div>
        </div>

        <!-- Histórico de Compras -->
        <div class="card-info">
            <h3><i class="fas fa-shopping-bag"></i> Histórico de Compras</h3>
            <div id="historicoCompras" class="compras-list">
                <p class="vazio">Nenhuma compra realizada ainda</p>
            </div>
        </div>

        <!-- Wishlist -->
        <div class="card-info">
            <h3><i class="fas fa-heart"></i> Minha Wishlist</h3>
            <div id="wishlist" class="wishlist-list">
                <p class="vazio">Nenhum item na wishlist</p>
            </div>
        </div>

        <!-- Configurações -->
        <div class="card-info">
            <h3><i class="fas fa-cog"></i> Configurações</h3>
            <div class="configuracoes">
                <label class="config-item">
                    <input type="checkbox" id="notificacoes" checked>
                    <span>Receber notificações por e-mail</span>
                </label>
                <label class="config-item">
                    <input type="checkbox" id="newsletter" checked>
                    <span>Inscrever-se na newsletter</span>
                </label>
                <label class="config-item">
                    <input type="checkbox" id="publicidade">
                    <span>Receber ofertas personalizadas</span>
                </label>
            </div>
            <button class="btn btn-salvar" onclick="salvarConfiguracoes()">💾 Salvar Configurações</button>
        </div>

        <!-- Ações Principais -->
        <div class="card-info card-acoes">
            <h3><i class="fas fa-tools"></i> Ações da Conta</h3>
            <div class="acoes-grid">
                <button class="btn btn-acao" onclick="alterarSenha()">
                    🔑 Alterar Senha
                </button>
                <button class="btn btn-acao" onclick="deletarConta()">
                    🗑️ Deletar Conta
                </button>
            </div>
        </div>
    </div>

    <!-- Error State -->
    <div id="erro" class="erro-show" style="display: none;">
        <h2>❌ Erro ao carregar dados</h2>
        <p id="erroMsg"></p>
        <button class="btn btn-primario" onclick="window.location.href='login.html'">
            Voltar ao Login
        </button>
    </div>
</div>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/12.14.0/firebase-app.js";
import { 
  getAuth, 
  onAuthStateChanged, 
  signOut,
  updatePassword,
  reauthenticateWithCredential,
  EmailAuthProvider,
  deleteUser
} from "https://www.gstatic.com/firebasejs/12.14.0/firebase-auth.js";
import { 
  getFirestore, 
  doc, 
  getDoc, 
  updateDoc,
  deleteDoc
} from "https://www.gstatic.com/firebasejs/12.14.0/firebase-firestore.js";

// 🔧 Configuração Firebase
const firebaseConfig = {
  apiKey: "AIzaSyC0V2t-XvpTq_2r_Z0YLc9_-3YF_1c4Mo0",
  authDomain: "samsung-cd18d.firebaseapp.com",
  projectId: "samsung-cd18d",
  storageBucket: "samsung-cd18d.firebasestorage.app",
  messagingSenderId: "582826463476",
  appId: "1:582826463476:web:063e0b28af2d2626d24ea1",
  measurementId: "G-Y3GJJTRXQ0"
};

const app = initializeApp(firebaseConfig);
const auth = getAuth(app);
const db = getFirestore(app);

// 🔎 Carregar dados do usuário
onAuthStateChanged(auth, async (user) => {
  if (user) {
    document.getElementById("loading").style.display = "block";
    try {
      const ref = doc(db, "usuarios", user.uid);
      const snap = await getDoc(ref);

      if (snap.exists()) {
        const dados = snap.data();
        console.log("Dados carregados:", dados);

        // Cabeçalho
        document.getElementById("nomeUsuario").textContent = (dados.nome || "") + " " + (dados.sobrenome || "");
        document.getElementById("emailUsuario").textContent = dados.email || "";
        if (dados.telefone) {
          document.getElementById("telefoneUsuario").style.display = "block";
          document.getElementById("telefoneUsuario").textContent = dados.telefone;
        }

        // Dados pessoais
        document.getElementById("infoNome").textContent = (dados.nome || "") + " " + (dados.sobrenome || "");
        document.getElementById("infoEmail").textContent = dados.email || "";
        document.getElementById("infoTelefone").textContent = dados.telefone || "-";

        if (dados.dataNascimento && dados.dataNascimento.dia) {
          document.getElementById("infoData").textContent =
            `${dados.dataNascimento.dia}/${dados.dataNascimento.mes}/${dados.dataNascimento.ano}`;
        } else if (typeof dados.dataNascimento === "string") {
          document.getElementById("infoData").textContent = dados.dataNascimento;
        }

        document.getElementById("conteudo").style.display = "block";
      } else {
        document.getElementById("erro").style.display = "block";
        document.getElementById("erroMsg").textContent = "Dados do usuário não encontrados!";
      }
    } catch (err) {
      document.getElementById("erro").style.display = "block";
      document.getElementById("erroMsg").textContent = "Erro: " + err.message;
    } finally {
      document.getElementById("loading").style.display = "none";
    }
  } else {
    window.location.href = "login.html";
  }
});

// ✏️ Habilitar edição
window.habilitarEdicao = async function() {
  const user = auth.currentUser;
  if (!user) return alert("❌ Usuário não autenticado!");

  const nomeAtual = document.getElementById("infoNome").textContent;
  const telefoneAtual = document.getElementById("infoTelefone").textContent;
  const dataAtual = document.getElementById("infoData").textContent;

  // Editar Nome
  const novoNome = prompt("✏️ Digite seu nome completo:", nomeAtual);
  if (novoNome === null) return; // Cancelado

  if (!novoNome.trim()) {
    alert("❌ Nome não pode ser vazio!");
    return;
  }

  // Editar Telefone
  const novoTelefone = prompt("📱 Digite seu telefone (opcional):", telefoneAtual);
  if (novoTelefone === null) return; // Cancelado

  // Editar Data de Nascimento
  const novaData = prompt("🎂 Digite sua data de nascimento (dd/mm/aaaa):", dataAtual);
  if (novaData === null) return; // Cancelado

  if (!validarData(novaData)) {
    alert("❌ Data inválida! Use o formato dd/mm/aaaa");
    return;
  }

  try {
    await salvarEdicao(novoNome, novoTelefone, novaData);
  } catch (err) {
    alert("❌ Erro ao atualizar: " + err.message);
  }
};

// Validar formato de data
function validarData(data) {
  const regex = /^\d{2}\/\d{2}\/\d{4}$/;
  if (!regex.test(data)) return false;

  const [dia, mes, ano] = data.split("/").map(Number);
  
  if (dia < 1 || dia > 31 || mes < 1 || mes > 12 || ano < 1900 || ano > 2026) {
    return false;
  }
  
  return true;
}

// 💾 Salvar edição
async function salvarEdicao(nomeCompleto, telefone, dataNascimentoStr) {
  const user = auth.currentUser;
  if (!user) return alert("❌ Usuário não autenticado!");

  const ref = doc(db, "usuarios", user.uid);

  const [nome, ...sobrenomeArr] = nomeCompleto.trim().split(" ");
  const sobrenome = sobrenomeArr.join(" ");

  let dia, mes, ano;
  if (dataNascimentoStr.includes("/")) {
    [dia, mes, ano] = dataNascimentoStr.split("/");
    dia = parseInt(dia);
    mes = parseInt(mes);
    ano = parseInt(ano);
  }

  await updateDoc(ref, {
    nome,
    sobrenome,
    telefone: telefone.trim(),
    dataNascimento: { dia, mes, ano }
  });

  alert("✅ Informações atualizadas com sucesso!");
  location.reload();
}

// � Salvar configurações
window.salvarConfiguracoes = async function() {
  const user = auth.currentUser;
  if (!user) return alert("Usuário não autenticado!");

  const ref = doc(db, "usuarios", user.uid);
  
  const notificacoes = document.getElementById("notificacoes").checked;
  const newsletter = document.getElementById("newsletter").checked;
  const publicidade = document.getElementById("publicidade").checked;

  try {
    await updateDoc(ref, {
      notificacoes,
      newsletter,
      publicidade
    });
    alert("✅ Configurações salvas com sucesso!");
  } catch (err) {
    alert("❌ Erro ao salvar configurações: " + err.message);
  }
};

// 🔑 Alterar senha
window.alterarSenha = function() {
  const senhaAtual = prompt("Digite sua senha atual:");
  if (!senhaAtual) return;

  const novaSenha = prompt("Digite a nova senha:");
  if (!novaSenha) return;

  const confirmarSenha = prompt("Confirme a nova senha:");
  if (novaSenha !== confirmarSenha) {
    return alert("❌ As senhas não conferem!");
  }

  if (novaSenha.length < 6) {
    return alert("❌ A senha deve ter pelo menos 6 caracteres!");
  }

  const user = auth.currentUser;
  if (!user) return alert("Usuário não autenticado!");

  // Reautenticar usuário
  const credential = EmailAuthProvider.credential(user.email, senhaAtual);
  
  reauthenticateWithCredential(user, credential)
    .then(() => {
      return updatePassword(user, novaSenha);
    })
    .then(() => {
      alert("✅ Senha alterada com sucesso!");
    })
    .catch((err) => {
      if (err.code === "auth/wrong-password") {
        alert("❌ Senha atual incorreta!");
      } else {
        alert("❌ Erro ao alterar senha: " + err.message);
      }
    });
};

// 🗑️ Deletar conta
window.deletarConta = function() {
  if (!confirm("⚠️ Tem certeza que deseja deletar sua conta? Esta ação é IRREVERSÍVEL!")) {
    return;
  }

  const user = auth.currentUser;
  if (!user) return alert("Usuário não autenticado!");

  const senhaConfirm = prompt("Digite sua senha para confirmar a deleção:");
  if (!senhaConfirm) return;

  const credential = EmailAuthProvider.credential(user.email, senhaConfirm);

  reauthenticateWithCredential(user, credential)
    .then(async () => {
      // Deletar documento do Firestore
      const ref = doc(db, "usuarios", user.uid);
      await deleteDoc(ref);
      
      // Deletar conta do Firebase Auth
      return deleteUser(user);
    })
    .then(() => {
      alert("✅ Conta deletada com sucesso!");
      window.location.href = "login.html";
    })
    .catch((err) => {
      if (err.code === "auth/wrong-password") {
        alert("❌ Senha incorreta!");
      } else {
        alert("❌ Erro ao deletar conta: " + err.message);
      }
    });
};

// �🚪 Logout
window.fazerLogout = async function() {
  try {
    // Confirmar logout
    if (!confirm("Você tem certeza que deseja sair?")) {
      return;
    }

    // Desconectar do Firebase
    await signOut(auth);
    
    // Limpar localStorage
    localStorage.removeItem("userLogged");
    localStorage.removeItem("carrinho_samsung");
    
    // Mostrar mensagem
    alert("✅ Você foi desconectado com sucesso!");
    
    // Redirecionar para login
    window.location.href = "login.html";
  } catch (err) {
    alert("❌ Erro ao sair: " + err.message);
  }
};
</script>
</body>
</html>
